version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devopsshop-postgres
    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: devopsshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops_user -d devopsshop"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devopsshop-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: devopsshop
      DB_USER: devops_user
      DB_PASSWORD: super_secret_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devopsshop-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: