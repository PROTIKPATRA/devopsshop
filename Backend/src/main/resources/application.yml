server:
  port: 8080

spring:
  application:
    name: devopsshop-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devopsshop}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Expose health endpoints for CI/CD pipeline checks and container orchestration probes
management:
  endpoints:
    web:
      exposure:
        # Add 'prometheus' here so it shows up at /actuator/prometheus
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
    # Explicitly enable the prometheus endpoint
    prometheus:
      enabled: true